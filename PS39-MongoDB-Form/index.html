<!DOCTYPE html>
<html><head><title>PS39 - Student Registration</title><link rel="stylesheet" href="style.css"></head>
<body>
  <h2>PS39 — Student Registration (MongoDB)</h2>
  <div class="layout">
    <form class="card" onsubmit="add(event)">
      <h3>Register Student</h3>
      <input id="nm" placeholder="Full Name" required>
      <input id="rn" placeholder="Roll No" required>
      <input id="br" placeholder="Branch (e.g. CSE)" required>
      <button type="submit">Register</button>
      <div id="msg" style="color:#4caf50;margin-top:8px;"></div>
    </form>
    <div class="card" style="flex:2">
      <h3>Students <button onclick="load()" style="font-size:.75rem;padding:5px 10px;">Refresh</button></h3>
      <div id="list"></div>
    </div>
  </div>
  <script>
    const B='http://localhost:3010';
    async function add(e){e.preventDefault();const r=await fetch(B+'/students',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById('nm').value,rollNo:document.getElementById('rn').value,branch:document.getElementById('br').value})});const d=await r.json();document.getElementById('msg').innerText=d.error||'✅ Registered!';if(!d.error)e.target.reset();load();}
    async function del(id){await fetch(B+'/students/'+id,{method:'DELETE'});load();}
    async function load(){const d=await(await fetch(B+'/students')).json();document.getElementById('list').innerHTML=d.length?d.map(s=>`<div class="row"><div><b>${s.name}</b><br><span style="color:#aab4fc">Roll: ${s.rollNo}</span> | <span class="tag">${s.branch}</span></div><button onclick="del('${s._id}')">🗑</button></div>`).join(''):'<p style="color:#888">No students registered.</p>';}
    load();
  </script>
</body></html>
