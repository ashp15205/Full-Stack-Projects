<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Gallery Filter</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <h1>🛍 Product Gallery</h1>
    <p>Filter by category · Search by name</p>
    <button id="adminToggle" class="btn-admin">🔐 Admin Login</button>
  </header>

  <main class="container">
    <!-- Admin: Add / Edit Form -->
    <div id="adminForm" class="admin-form hidden">
      <h3 id="adminFormTitle">Add Product</h3>
      <div class="admin-form-row">
        <div class="af-field"><label>Emoji</label><input id="fEmoji" type="text" placeholder="🎁" maxlength="4"/></div>
        <div class="af-field"><label>Name</label><input id="fName" type="text" placeholder="Product Name"/></div>
        <div class="af-field">
          <label>Category</label>
          <select id="fCat">
            <option value="electronics">Electronics</option>
            <option value="clothing">Clothing</option>
            <option value="books">Books</option>
            <option value="sports">Sports</option>
          </select>
        </div>
        <div class="af-field"><label>Price (₹)</label><input id="fPrice" type="number" placeholder="999" min="0"/></div>
        <div class="af-field"><label>Rating (1-5)</label><input id="fRating" type="number" placeholder="4" min="1" max="5"/></div>
      </div>
      <div class="af-actions">
        <button id="saveProductBtn" class="btn-save">💾 Save</button>
        <button class="btn-cancel" onclick="closeAdminForm()">✕ Cancel</button>
      </div>
    </div>

    <div class="controls">
      <input type="text" id="searchInput" placeholder="🔍 Search products..." class="search-box"/>
      <div class="filter-btns" id="filterBtns">
        <button class="filter-btn active" data-cat="all">All</button>
        <button class="filter-btn" data-cat="electronics">Electronics</button>
        <button class="filter-btn" data-cat="clothing">Clothing</button>
        <button class="filter-btn" data-cat="books">Books</button>
        <button class="filter-btn" data-cat="sports">Sports</button>
      </div>
      <button id="addProductBtn" class="btn-add-product hidden">+ Add Product</button>
    </div>

    <p id="countMsg" class="count-msg"></p>
    <div class="products-grid" id="grid"></div>
    <div id="noResults" class="no-results hidden">😕 No products found</div>
  </main>
  <script src="script.js"></script>
</body>
</html>
