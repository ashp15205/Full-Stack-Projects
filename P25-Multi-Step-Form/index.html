<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Multi-Step Form</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app">
    <div class="form-card">
      <!-- Progress -->
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="step-indicators" id="stepIndicators"></div>

      <!-- Steps -->
      <form id="multiForm" novalidate>
        <!-- Step 1: Personal -->
        <div class="step" id="step1">
          <h2>👤 Personal Info</h2>
          <p class="step-subtitle">Tell us about yourself</p>
          <div class="field-group"><label>First Name</label><input id="firstName" type="text" placeholder="John"/><span class="err" id="firstNameErr"></span></div>
          <div class="field-group"><label>Last Name</label><input id="lastName" type="text" placeholder="Doe"/><span class="err" id="lastNameErr"></span></div>
          <div class="field-group"><label>Date of Birth</label><input id="dob" type="date"/><span class="err" id="dobErr"></span></div>
        </div>

        <!-- Step 2: Contact -->
        <div class="step hidden" id="step2">
          <h2>📱 Contact Details</h2>
          <p class="step-subtitle">How can we reach you?</p>
          <div class="field-group"><label>Email</label><input id="email" type="email" placeholder="john@example.com"/><span class="err" id="emailErr"></span></div>
          <div class="field-group"><label>Phone</label><input id="phone" type="tel" placeholder="10-digit number"/><span class="err" id="phoneErr"></span></div>
          <div class="field-group"><label>City</label><input id="city" type="text" placeholder="Mumbai"/><span class="err" id="cityErr"></span></div>
        </div>

        <!-- Step 3: Account -->
        <div class="step hidden" id="step3">
          <h2>🔐 Account Setup</h2>
          <p class="step-subtitle">Secure your account</p>
          <div class="field-group"><label>Username</label><input id="username" type="text" placeholder="johndoe123"/><span class="err" id="usernameErr"></span></div>
          <div class="field-group"><label>Password</label><input id="password" type="password" placeholder="Min 8 characters"/><span class="err" id="passwordErr"></span></div>
          <div class="field-group">
            <label>Role</label>
            <select id="role"><option value="">Select role…</option><option>Developer</option><option>Designer</option><option>Manager</option><option>Student</option></select>
            <span class="err" id="roleErr"></span>
          </div>
        </div>

        <!-- Step 4: Review -->
        <div class="step hidden" id="step4">
          <h2>✅ Review & Submit</h2>
          <p class="step-subtitle">Confirm your information</p>
          <div class="review-grid" id="reviewGrid"></div>
        </div>

        <!-- Step 5: Success -->
        <div class="step hidden" id="step5">
          <div class="success-screen">
            <div class="success-icon">🎉</div>
            <h2>Account Created!</h2>
            <p>Welcome aboard. Your account has been successfully created.</p>
            <button type="button" class="btn-restart" onclick="restart()">Start Over</button>
          </div>
        </div>
      </form>

      <!-- Navigation -->
      <div class="nav-btns" id="navBtns">
        <button type="button" id="prevBtn" class="btn-prev" onclick="prevStep()">← Back</button>
        <button type="button" id="nextBtn" class="btn-next" onclick="nextStep()">Next →</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
