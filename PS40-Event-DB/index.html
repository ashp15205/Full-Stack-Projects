<!DOCTYPE html>
<html><head><title>PS40 - Event Registration</title><link rel="stylesheet" href="style.css"></head>
<body>
  <h2>PS40 — Event Registration</h2>
  <div class="layout">
    <form class="card" onsubmit="reg(event)">
      <h3>Register for Event</h3>
      <input id="nm" placeholder="Full Name" required>
      <input id="em" type="email" placeholder="Email" required>
      <input id="ev" placeholder="Event Name" required>
      <button type="submit">Register</button>
      <div id="msg" style="margin-top:10px;color:#4caf50;font-size:.9rem;"></div>
    </form>
    <div class="card" style="flex:2">
      <h3>Registrations <button onclick="load()" style="font-size:.75rem;padding:5px 10px;">Refresh</button></h3>
      <div id="list"></div>
    </div>
  </div>
  <script>
    const BASE='http://localhost:3006';
    async function reg(e){e.preventDefault();const body={name:document.getElementById('nm').value,email:document.getElementById('em').value,eventName:document.getElementById('ev').value};const r=await fetch(BASE+'/registrations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();document.getElementById('msg').innerText=d.msg;e.target.reset();load();}
    async function del(id){await fetch(BASE+'/registrations/'+id,{method:'DELETE'});load();}
    async function load(){const d=await(await fetch(BASE+'/registrations')).json();document.getElementById('list').innerHTML=d.length?d.map(r=>`<div class="row"><div><b>${r.name}</b><br><span style="color:#888">${r.email}</span><br><span class="tag">${r.eventName}</span></div><button onclick="del('${r._id}')">🗑</button></div>`).join(''):'<p style="color:#888">No registrations yet.</p>';}
    load();
  </script>
</body></html>
