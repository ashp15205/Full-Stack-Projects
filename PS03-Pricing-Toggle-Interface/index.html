<!DOCTYPE html>
<html>
<head>
    <title>Pricing Toggle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Pricing Plans</h2>

    <!-- Toggle Buttons -->
    <div class="toggle">
        <button id="monthly" onclick="setPlan(false)" class="active">Monthly</button>
        <button id="yearly" onclick="setPlan(true)">Yearly</button>
    </div>

    <!-- Pricing Cards -->
    <div class="cards">
        <div class="card">
            <h3>Basic</h3>
            <p id="basic">₹500 / mo</p>
        </div>

        <div class="card">
            <h3>Pro</h3>
            <p id="pro">₹1000 / mo</p>
        </div>

        <div class="card">
            <h3>Premium</h3>
            <p id="premium">₹1500 / mo</p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
