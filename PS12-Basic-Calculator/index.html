<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Standard Calculator</h1>
            <p>Clean grid-based utility for daily arithmetic.</p>
        </header>

        <main class="calc-wrapper">
            <div class="calc-display">
                <div id="history" class="history"></div>
                <div id="current" class="current">0</div>
            </div>
            
            <div class="calc-grid">
                <button class="btn ac" onclick="clearDisplay()">AC</button>
                <button class="btn del" onclick="deleteDigit()">DEL</button>
                <button class="btn op" onclick="appendOperator('/')">÷</button>
                <button class="btn op" onclick="appendOperator('*')">×</button>
                
                <button class="btn" onclick="appendNumber('7')">7</button>
                <button class="btn" onclick="appendNumber('8')">8</button>
                <button class="btn" onclick="appendNumber('9')">9</button>
                <button class="btn op" onclick="appendOperator('-')">-</button>
                
                <button class="btn" onclick="appendNumber('4')">4</button>
                <button class="btn" onclick="appendNumber('5')">5</button>
                <button class="btn" onclick="appendNumber('6')">6</button>
                <button class="btn op" onclick="appendOperator('+')">+</button>
                
                <button class="btn" onclick="appendNumber('1')">1</button>
                <button class="btn" onclick="appendNumber('2')">2</button>
                <button class="btn" onclick="appendNumber('3')">3</button>
                <button class="btn eq" onclick="calculate()">=</button>
                
                <button class="btn wide" onclick="appendNumber('0')">0</button>
                <button class="btn" onclick="appendNumber('.')">.</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
