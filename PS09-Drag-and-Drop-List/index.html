<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag and Drop List</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Task Reorder</h1>
            <p>Drag and drop items to organize your priorities.</p>
        </header>

        <section class="task-manager">
            <div class="input-row">
                <input type="text" id="taskInput" placeholder="Add a new task...">
                <button id="addTaskBtn">Add</button>
            </div>
            
            <ul id="taskList" class="task-list">
                <!-- Static items for demo -->
                <li class="task-item" draggable="true">Research React 19 features</li>
                <li class="task-item" draggable="true">Draft project architecture</li>
                <li class="task-item" draggable="true">Finalize design system</li>
                <li class="task-item" draggable="true">Setup CI/CD pipeline</li>
            </ul>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
