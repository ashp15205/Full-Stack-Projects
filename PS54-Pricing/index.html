<!DOCTYPE html>
<html><head><title>PS54 - Pricing Toggle</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container py-5 text-center">
    <h2 class="mb-2">Choose Your Plan</h2>
    <p class="text-secondary mb-4">Toggle between monthly and yearly billing</p>
    <div class="d-flex justify-content-center align-items-center gap-3 mb-5">
      <span id="mLabel" class="fw-bold text-white">Monthly</span>
      <div class="form-check form-switch m-0"><input class="form-check-input" type="checkbox" id="toggle" onchange="switchPlan()" style="width:50px;height:26px;cursor:pointer;"></div>
      <span id="yLabel" class="text-secondary">Yearly <span class="badge" style="background:#6c63ff;font-size:.7rem">Save 20%</span></span>
    </div>
    <div class="row g-4 justify-content-center" id="cards"></div>
  </div>
  <script src="script.js"></script>
</body></html>
