<!DOCTYPE html>
<html><head><title>PS7 - Travel Agency Leads</title><link rel="stylesheet" href="style.css"></head>
<body>
  <h2>PS7 — Travel Agency Lead Manager</h2>
  <div class="layout">
    <div class="card">
      <h3>Add Lead</h3>
      <input id="nm" placeholder="Client Name" required>
      <input id="em" placeholder="Email">
      <input id="dest" placeholder="Destination (e.g. Goa)">
      <input id="ph" placeholder="Phone">
      <button onclick="add()">Add Lead</button>
      <div id="msg" style="color:#4caf50;margin-top:8px;font-size:.9rem;"></div>
    </div>
    <div class="card" style="flex:2">
      <h3>All Leads <button onclick="load()" style="font-size:.75rem;padding:5px 10px;">Refresh</button></h3>
      <div id="list"></div>
    </div>
  </div>
  <script>
    const BASE = 'http://localhost:3013';
    async function add() {
      const body = {
        name: document.getElementById('nm').value,
        email: document.getElementById('em').value,
        destination: document.getElementById('dest').value,
        phone: document.getElementById('ph').value
      };
      if (!body.name) return alert('Name required');
      const res = await fetch(BASE+'/leads', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      const d = await res.json();
      document.getElementById('msg').innerText = '✅ Lead added: ' + d.name;
      document.getElementById('nm').value = '';
      document.getElementById('em').value = '';
      document.getElementById('dest').value = '';
      document.getElementById('ph').value = '';
      load();
    }
    async function load() {
      try {
        const d = await (await fetch(BASE+'/leads')).json();
        document.getElementById('list').innerHTML = d.length
          ? d.map(l => `<div class="row">
              <div>
                <b>${l.name}</b><br>
                <span style="color:#aab4fc">✈ ${l.destination || '—'}</span> | <span style="color:#888">${l.email || '—'}</span>
              </div>
              <span style="color:#888;font-size:.8rem">📞 ${l.phone || '—'}</span>
            </div>`).join('')
          : '<p style="color:#888">No leads yet. Add the first client!</p>';
      } catch(e) {
        document.getElementById('list').innerHTML = '<p style="color:#f72585">Cannot connect to server. Run: node server.js</p>';
      }
    }
    load();
  </script>
</body></html>
