<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app">
    <header>
      <h1>✅ Task Manager</h1>
      <p id="taskCount">0 tasks</p>
    </header>

    <div class="add-task-row">
      <input type="text" id="taskInput" placeholder="Add a new task..." maxlength="100"/>
      <select id="prioritySelect">
        <option value="low">🟢 Low</option>
        <option value="medium" selected>🟡 Medium</option>
        <option value="high">🔴 High</option>
      </select>
      <button id="addBtn">Add</button>
    </div>

    <div class="filter-row">
      <button class="filt active" data-f="all">All</button>
      <button class="filt" data-f="active">Active</button>
      <button class="filt" data-f="completed">Completed</button>
      <button id="clearCompleted" class="clear-btn">Clear Completed</button>
    </div>

    <ul id="taskList" class="task-list"></ul>
    <p id="emptyMsg" class="empty-msg">No tasks yet. Add one above!</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
