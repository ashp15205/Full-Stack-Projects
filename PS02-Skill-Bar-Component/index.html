<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Bar Component</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Skill Proficiency</h1>
            <p>Visual representation of technical skills and expertise.</p>
        </header>

        <section class="skill-input">
            <div class="input-row">
                <input type="text" id="skillName" placeholder="Skill Name (e.g. React)">
                <input type="number" id="skillValue" placeholder="Percentage (0-100)">
                <button id="addSkillBtn">Add Skill</button>
            </div>
        </section>

        <div id="skillsContainer" class="skills-list">
            <!-- Dynamic skills will appear here -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
