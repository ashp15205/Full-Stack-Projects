<!doctype html>
<html>
  <head>
    <title>PS23 - Soft Delete</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>PS23 — Soft Delete System</h2>
    <div class="layout">
      <div class="card">
        <h3>Add Record</h3>
        <input id="rname" placeholder="Full Name" />
        <input id="remail" placeholder="Email" />
        <button onclick="add()">Add</button>
      </div>
      <div class="card" style="flex: 2">
        <div
          style="
            display: flex;
            gap: 10px;
            align-items: center;
          "
        >
          <button onclick="view('active')">Active</button>
          <button
            onclick="view('archived')"
            style="background: rgba(255, 255, 255, 0.1)"
          >
            Archived
          </button>
          <span
            id="mode"
            style="color: #888; font-size: 0.85rem"
            >Showing: Active</span
          >
        </div>
        <div id="list" style="margin-top: 15px"></div>
      </div>
    </div>
    <script>
      const BASE = "http://localhost:3003";
      let cur = "active";
      async function add() {
        await fetch(BASE + "/records", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: document.getElementById("rname").value,
            email: document.getElementById("remail").value,
          }),
        });
        view(cur);
      }
      async function del(id) {
        await fetch(BASE + "/records/" + id, {
          method: "DELETE",
        });
        view(cur);
      }
      async function restore(id) {
        await fetch(BASE + "/records/" + id + "/restore", {
          method: "PATCH",
        });
        view(cur);
      }
      async function view(mode) {
        cur = mode;
        document.getElementById("mode").innerText =
          "Showing: " + mode;
        const url =
          mode === "archived"
            ? BASE + "/records/archived"
            : BASE + "/records";
        const d = await (await fetch(url)).json();
        document.getElementById("list").innerHTML = d.length
          ? d
              .map(
                (r) => `<div class="row">
        <div><b>${r.name}</b><br><span style="color:#888">${r.email}</span></div>
        <div>${mode === "active" ? `<button onclick="del('${r._id}')">🗑 Soft Delete</button>` : `<button onclick="restore('${r._id}')" style="background:rgba(76,175,80,.3);color:#4caf50">↩ Restore</button>`}</div>
      </div>`,
              )
              .join("")
          : '<p style="color:#888">No records found.</p>';
      }
      view("active");
    </script>
  </body>
</html>
