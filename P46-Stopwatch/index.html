<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stopwatch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app">
    <div class="watch-card">
      <h1>⏱ Stopwatch</h1>
      <div class="display">
        <span id="hours">00</span><span class="sep">:</span>
        <span id="minutes">00</span><span class="sep">:</span>
        <span id="seconds">00</span><span class="ms">.<span id="ms">00</span></span>
      </div>
      <div class="controls">
        <button id="startBtn" class="btn-start-sw">▶ Start</button>
        <button id="lapBtn" class="btn-lap" disabled>🏁 Lap</button>
        <button id="resetBtn" class="btn-reset" disabled>↺ Reset</button>
      </div>
      <div class="laps-section">
        <div class="laps-header" id="lapsHeader" style="display:none">
          <span>Lap</span><span>Split</span><span>Total</span>
        </div>
        <ul id="lapList" class="lap-list"></ul>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
