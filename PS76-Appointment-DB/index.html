<!doctype html>
<html>
  <head>
    <title>PS76 - Book Appointment</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>PS76 — Appointment Booking</h2>
    <div class="layout">
      <form class="card" onsubmit="book(event)">
        <h3>Book Appointment</h3>
        <input id="nm" placeholder="Your Name" required />
        <input id="dt" type="date" required />
        <input id="tm" type="time" required />
        <button type="submit">Book Now</button>
        <div
          id="msg"
          style="
            color: #4caf50;
            margin-top: 8px;
            font-size: 0.9rem;
          "
        ></div>
      </form>
      <div class="card" style="flex: 2">
        <h3>
          Booked Appointments
          <button
            onclick="load()"
            style="font-size: 0.75rem; padding: 5px 10px"
          >
            Refresh
          </button>
        </h3>
        <div id="list"></div>
      </div>
    </div>
    <script>
      const BASE = "http://localhost:3008";
      async function book(e) {
        e.preventDefault();
        const body = {
          name: document.getElementById("nm").value,
          date: document.getElementById("dt").value,
          time: document.getElementById("tm").value,
        };
        await fetch(BASE + "/appointments", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        document.getElementById("msg").innerText =
          "✅ Appointment booked!";
        e.target.reset();
        load();
      }
      async function del(id) {
        await fetch(BASE + "/appointments/" + id, {
          method: "DELETE",
        });
        load();
      }
      async function load() {
        try {
          const d = await (
            await fetch(BASE + "/appointments")
          ).json();
          document.getElementById("list").innerHTML =
            d.length
              ? d
                  .map(
                    (a) =>
                      `<div class="row"><div><b>${a.name}</b><br><span style="color:#aab4fc">📅 ${a.date} &nbsp; ⏰ ${a.time}</span></div><button onclick="del('${a._id}')">Cancel 🗑</button></div>`,
                  )
                  .join("")
              : '<p style="color:#888">No appointments booked yet.</p>';
        } catch {
          document.getElementById("list").innerHTML =
            '<p style="color:#f72585">Start server: node server.js</p>';
        }
      }
      load();
    </script>
  </body>
</html>
