<!doctype html>
<html>
  <head>
    <title>PS75 - Homepage</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <b>EduLearn</b>
      <a href="#courses">Courses</a
      ><a href="#contact">Contact</a>
    </nav>
    <section class="hero">
      <h1>Learn Skills That Matter</h1>
      <p>
        Explore our expertly crafted courses to build your
        career.
      </p>
      <button>Browse Courses</button>
    </section>
    <section id="courses">
      <h2>Our Courses</h2>
      <div id="cards"></div>
    </section>
    <section id="contact">
      <h2>Contact</h2>
      <form onsubmit="(e) => e.preventDefault()">
        <input placeholder="Your Name" /><input
          placeholder="Email"
        /><button type="submit">Send</button>
      </form>
    </section>
    <footer>
      <p>© 2026 EduLearn. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
