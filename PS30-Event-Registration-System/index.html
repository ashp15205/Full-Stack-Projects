<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Event Registration</h1>
            <p>Secure your spot at our upcoming technical summits and workshops.</p>
        </header>

        <section class="registration-hub">
            <div class="pane">
                <h2 id="formTitle">Register Participant</h2>
                <form id="regForm">
                    <input type="hidden" id="participantId">
                    <div class="input-group">
                        <label>Participant Name</label>
                        <input type="text" id="name" placeholder="John Doe" required>
                    </div>
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="john@example.com" required>
                    </div>
                    <div class="input-group">
                        <label>Select Event</label>
                        <select id="eventName" required>
                            <option value="">Choose an Event</option>
                            <option value="Tech Summit 2024">Tech Summit 2024</option>
                            <option value="Web3 Workshop">Web3 Workshop</option>
                            <option value="AI Hackathon">AI Hackathon</option>
                            <option value="DevOps Seminar">DevOps Seminar</option>
                        </select>
                    </div>
                    <div class="actions">
                        <button type="submit" id="submitBtn" class="btn-primary">Register Now</button>
                        <button type="button" id="cancelBtn" class="btn-text hidden">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="participation-list">
                <div class="list-header">
                    <h2>Recent Registrations</h2>
                    <span id="regCount" class="badge">0 Total</span>
                </div>
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th>Participant</th>
                                <th>Event Name</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="regTable">
                            <!-- Entries injected here -->
                        </tbody>
                    </table>
                </div>
                <div id="noData" class="no-data hidden">
                    No active registrations found in the system.
                </div>
            </div>
        </section>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="script.js"></script>
</body>
</html>
