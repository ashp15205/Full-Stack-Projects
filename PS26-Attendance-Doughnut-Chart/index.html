<!DOCTYPE html>
<html>
<head>
    <title>Attendance Chart</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 40px;
            background: #f4f4f4;
        }
        canvas {
            max-width: 400px;
            margin: auto;
        }
    </style>
</head>
<body>

<h2>Attendance Distribution</h2>

<canvas id="chart"></canvas>

<!-- OFFLINE Chart.js -->
<script src="node_modules/chart.js/dist/chart.umd.js"></script>

<script>
const ctx = document.getElementById('chart');

// change type: 'pie' or 'doughnut'
new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: ['Present', 'Absent', 'Leave'],
        datasets: [{
            data: [70, 20, 10],   // static data
            backgroundColor: ['green', 'red', 'orange']
        }]
    }
});
</script>

</body>
</html>
