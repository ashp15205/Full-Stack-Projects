<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Record Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Student Record System</h1>
            <p>Official database for managing student enrollment and branch allocation.</p>
        </header>

        <div class="layout">
            <!-- Registration Pane -->
            <section class="pane form-pane">
                <h2 id="formTitle">Enroll Student</h2>
                <form id="studentForm">
                    <input type="hidden" id="studentId">
                    <div class="input-group">
                        <label>Student Full Name</label>
                        <input type="text" id="name" placeholder="E.g. Ashish Patil" required>
                    </div>
                    <div class="input-group">
                        <label>University Roll No.</label>
                        <input type="text" id="rollNo" placeholder="REG-2024-089" required>
                    </div>
                    <div class="input-group">
                        <label>Engineering Branch</label>
                        <select id="branch" required>
                            <option value="">Select Branch</option>
                            <option value="Computer Engineering">Computer Engineering</option>
                            <option value="Information Technology">Information Technology</option>
                            <option value="Mechanical Engineering">Mechanical Engineering</option>
                            <option value="Civil Engineering">Civil Engineering</option>
                            <option value="Electronics & TC">Electronics & TC</option>
                        </select>
                    </div>
                    <div class="actions">
                        <button type="submit" id="submitBtn" class="btn-primary">Save Enrollment</button>
                        <button type="button" id="cancelBtn" class="btn-text hidden">Cancel Edit</button>
                    </div>
                </form>
            </section>

            <!-- Data Pane -->
            <section class="pane data-pane">
                <h2>Enrolled Students</h2>
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Roll No</th>
                                <th>Branch</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentTable">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                </div>
                <div id="noData" class="no-data hidden">
                    No student records found in the database.
                </div>
            </section>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <script src="script.js"></script>
</body>
</html>
