<!DOCTYPE html>
<html><head><title>PS56 - Express API</title><link rel="stylesheet" href="style.css"></head>
<body>
  <h2>PS56 — Express API with MongoDB</h2>
  <div class="layout">
    <div class="card">
      <h3>Add Category</h3>
      <input id="cname" placeholder="Category name">
      <button onclick="addCat()">Add Category</button>
      <div id="cats" style="margin-top:12px;"></div>
    </div>
    <div class="card">
      <h3>Add Product</h3>
      <input id="pname" placeholder="Product name">
      <input id="pprice" type="number" placeholder="Price (₹)">
      <input id="pstock" type="number" placeholder="Stock qty">
      <input id="pcatid" placeholder="Category ID">
      <button onclick="addProd()">Add Product</button>
    </div>
    <div class="card" style="flex:2">
      <h3>All Products <button onclick="loadProds()" style="font-size:.75rem;padding:4px 9px;">Refresh</button></h3>
      <div id="prods"></div>
    </div>
  </div>
  <script>
    const B = 'http://localhost:3011';
    async function addCat() {const r=await fetch(B+'/categories',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById('cname').value})});const d=await r.json();loadCats();}
    async function addProd() {const body={name:document.getElementById('pname').value,price:+document.getElementById('pprice').value,stock:+document.getElementById('pstock').value,category:document.getElementById('pcatid').value};await fetch(B+'/products',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});loadProds();}
    async function delProd(id){await fetch(B+'/products/'+id,{method:'DELETE'});loadProds();}
    async function loadCats(){try{const d=await(await fetch(B+'/categories')).json();document.getElementById('cats').innerHTML=d.map(c=>`<div class="row"><span style="color:#aab4fc">${c.name}</span><small style="color:#555">${c._id}</small></div>`).join('');}catch{}}
    async function loadProds(){try{const d=await(await fetch(B+'/products')).json();document.getElementById('prods').innerHTML=d.length?d.map(p=>`<div class="row"><div><b>${p.name}</b><br><span style="color:#888">₹${p.price} | Stock: ${p.stock}</span></div><button onclick="delProd('${p._id}')">🗑</button></div>`).join(''):'<p style="color:#888">No products.</p>';}catch(e){document.getElementById('prods').innerHTML='<p style="color:#f72585">Run: node server.js</p>';}}
    loadCats(); loadProds();
  </script>
</body></html>
