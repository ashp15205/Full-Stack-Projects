<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drag & Drop List</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <h1>↕ Drag & Drop List</h1>
    <p>Drag items to reorder · Click ✓ to complete</p>
  </header>

  <main class="container">
    <div class="panels">
      <!-- Todo List -->
      <div class="panel">
        <h2>📋 Task List</h2>
        <ul id="taskList" class="drag-list" data-list="todo"></ul>
        <div class="add-row">
          <input type="text" id="newTask" placeholder="Add new task..."/>
          <button id="addTask">+</button>
        </div>
      </div>

      <!-- Kanban-style Done List -->
      <div class="panel">
        <h2>✅ Completed</h2>
        <ul id="doneList" class="drag-list done-list" data-list="done"></ul>
        <p class="empty-hint" id="doneHint">Drop or check items here</p>
      </div>
    </div>

    <div class="order-display">
      <h3>Current Order (IDs)</h3>
      <div id="orderDisplay" class="order-ids"></div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
