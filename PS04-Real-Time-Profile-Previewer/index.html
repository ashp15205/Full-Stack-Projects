<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Profile Previewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Profile Previewer</h1>
            <p>Update the form to see changes in real-time.</p>
        </header>

        <div class="layout-grid">
            <!-- Form Section -->
            <section class="form-section">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="nameInput" placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label>Job Title</label>
                    <input type="text" id="jobInput" placeholder="Web Developer">
                </div>
                <div class="input-group">
                    <label>Bio</label>
                    <textarea id="bioInput" placeholder="Write something about yourself..."></textarea>
                </div>
            </section>

            <!-- Preview Section -->
            <section class="preview-section">
                <div class="profile-card" id="profileCard">
                    <div class="avatar">JP</div>
                    <h2 id="nameDisplay">John Doe</h2>
                    <p id="jobDisplay" class="job-tag">Web Developer</p>
                    <p id="bioDisplay">Your bio will appear here as you type in the form.</p>
                </div>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
