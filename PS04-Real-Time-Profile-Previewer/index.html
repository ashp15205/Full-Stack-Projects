<!DOCTYPE html>
<html>
<head>
    <title>Profile Preview</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Profile Previewer</h2>

<div class="container">

    <!-- Form -->
    <div class="form">
        <input id="name" placeholder="Name" oninput="update()">
        <input id="email" placeholder="Email" oninput="update()">
        <input id="mobile" placeholder="Mobile" oninput="update()">
        <textarea id="bio" placeholder="Bio" oninput="update()"></textarea>
    </div>

    <!-- Profile Card -->
    <div class="card">
        <h3 id="pname">Your Name</h3>
        <p id="pemail">your@email.com</p>
        <p id="pmob">your mobile number</p>
        <p id="pbio">Your bio appears here...</p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
