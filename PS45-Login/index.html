<!DOCTYPE html>
<html><head><title>PS45 - Login Form</title><link rel="stylesheet" href="style.css"></head>
<body>
  <div class="card">
    <h2>Login</h2>
    <form onsubmit="login(event)">
      <input id="em" type="text" placeholder="Email address">
      <div id="emErr" class="err"></div>
      <input id="pw" type="password" placeholder="Password (min 6 chars)">
      <div id="pwErr" class="err"></div>
      <button type="submit">Sign In</button>
    </form>
  </div>
  <script src="script.js"></script>
</body></html>
