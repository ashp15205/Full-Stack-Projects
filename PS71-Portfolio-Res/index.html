<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PS71 - Responsive Portfolio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-nav">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#" style="color:#f72585">Portfolio</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
          <li class="nav-item"><a class="nav-link" href="#skills">Skills</a></li>
          <li class="nav-item"><a class="nav-link" href="#projects">Projects</a></li>
          <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- About -->
  <section id="about" class="hero d-flex align-items-center justify-content-center text-center">
    <div>
      <div class="avatar mx-auto mb-3">JD</div>
      <h1 class="display-4 fw-bold">Jane Doe</h1>
      <p class="lead" style="color:#aab4fc">Full Stack Developer | UI/UX Enthusiast</p>
      <p class="text-secondary mx-auto" style="max-width:500px">Passionate about building beautiful, functional web applications. Open to opportunities worldwide.</p>
    </div>
  </section>

  <!-- Skills -->
  <section id="skills" class="py-5">
    <div class="container">
      <h2 class="text-center section-title mb-4">Skills</h2>
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div id="skill-bars"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Projects -->
  <section id="projects" class="py-5" style="background:rgba(255,255,255,0.02)">
    <div class="container">
      <h2 class="text-center section-title mb-4">Projects</h2>
      <div class="row g-4" id="project-cards"></div>
    </div>
  </section>

  <!-- Contact -->
  <section id="contact" class="py-5">
    <div class="container text-center">
      <h2 class="section-title mb-4">Contact</h2>
      <form class="mx-auto" style="max-width:500px" onsubmit="e => { e.preventDefault(); alert('Message sent!'); }">
        <input class="form-control dark-inp mb-3" placeholder="Your Name">
        <input class="form-control dark-inp mb-3" type="email" placeholder="Email">
        <textarea class="form-control dark-inp mb-3" rows="4" placeholder="Your message..."></textarea>
        <button type="submit" class="btn btn-grad w-100">Send Message</button>
      </form>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
