<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Stopwatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Digital Stopwatch</h1>
            <p>Precise millisecond tracking for sports and productivity.</p>
        </header>

        <main class="stopwatch-box">
            <div id="display" class="timer-display">00:00:00<small>.000</small></div>
            
            <div class="controls">
                <button id="startBtn" class="btn primary">Start</button>
                <button id="lapBtn" class="btn secondary">Lap</button>
                <button id="resetBtn" class="btn outline">Reset</button>
            </div>

            <div class="laps-container">
                <h3>Recorded Laps</h3>
                <ul id="lapsList" class="laps-list">
                    <!-- Lap items injected here -->
                </ul>
                <div id="noLaps" class="no-laps">No laps recorded yet.</div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
