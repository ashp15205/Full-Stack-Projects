<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Analytics Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Climate Analytics</h1>
            <p>Environmental tracking and atmospheric data visualization.</p>
        </header>

        <main class="dashboard-grid">
            <div class="chart-card full">
                <h3>Temperature Trends (Monthly)</h3>
                <canvas id="lineChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Precipitation Distribution</h3>
                <canvas id="barChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Conditions Overview</h3>
                <canvas id="pieChart"></canvas>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
