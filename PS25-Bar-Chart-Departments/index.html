<!DOCTYPE html>
<html>
<head>
    <title>Bar Chart</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 40px;
            background: #f4f4f4;
        }
        canvas {
            max-width: 500px;
            margin: auto;
        }
    </style>
</head>
<body>

<h2>Students in Departments</h2>

<canvas id="chart"></canvas>

<!-- OFFLINE Chart.js -->
<script src="node_modules/chart.js/dist/chart.umd.js"></script>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Computer', 'IT', 'Mechanical', 'Civil'],
        datasets: [{
            label: 'Students',
            data: [60, 50, 40, 30],   // static data
            borderWidth: 1
        }]
    },
    options: {
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});
</script>

</body>
</html>
