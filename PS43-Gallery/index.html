<!doctype html>
<html>
  <head>
    <title>PS43 - Photo Gallery</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>Photo Gallery</h2>
    <div
      style="
        background: rgba(255, 255, 255, 0.05);
        padding: 15px;
        border-radius: 8px;
        margin: 0 auto 20px auto;
        max-width: 600px;
      "
    >
      <h3 style="margin-top: 0">Manage Gallery (CRUD)</h3>
      <div style="display: flex; gap: 10px">
        <input
          type="text"
          id="inp"
          placeholder="Image URL..."
          style="
            flex: 1;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #fff;
            color: #fff;
            border-radius: 4px;
          "
        />
        <button
          onclick="add()"
          style="
            padding: 8px 15px;
            background: #6c63ff;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
          "
        >
          Add Image
        </button>
      </div>
    </div>
    <p>Hover over images to zoom</p>
    <div id="list" class="gallery"></div>
    <script src="script.js"></script>
  </body>
</html>
