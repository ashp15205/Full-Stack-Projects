<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Photo Gallery</h1>
            <p>A minimalist masonry-style layout for visual storytelling.</p>
        </header>

        <main class="gallery-grid">
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=800" alt="Nature">
                <div class="overlay"><h4>Wanderlust</h4></div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=800" alt="Nature">
                <div class="overlay"><h4>Deep Forest</h4></div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=800" alt="Nature">
                <div class="overlay"><h4>Lake View</h4></div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?q=80&w=800" alt="Nature">
                <div class="overlay"><h4>Quiet Paths</h4></div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1500627847162-f744bd7f8149?q=80&w=800" alt="Nature">
                <div class="overlay"><h4>Mountain Mist</h4></div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1426604966848-d7adac402bff?q=80&w=800" alt="Nature">
                <div class="overlay"><h4>Serenity</h4></div>
            </div>
        </main>
    </div>
</body>
</html>
