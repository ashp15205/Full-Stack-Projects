<!doctype html>
<html>
  <head>
    <title>PS63 - Live Profile</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>PS63 — Live Profile Preview</h2>
    <div class="layout">
      <div class="card form-side">
        <h3>Edit Details</h3>
        <input
          id="nm"
          placeholder="Your Name"
          oninput="u()"
        />
        <input
          id="role"
          placeholder="Your Role / Title"
          oninput="u()"
        />
        <input id="em" placeholder="Email" oninput="u()" />
      </div>
      <div class="preview">
        <div class="av" id="av">?</div>
        <h3 id="pn">Your Name</h3>
        <p id="pr" class="role-txt">Your Role</p>
        <p id="pe" class="email-txt">✉ email@example.com</p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
