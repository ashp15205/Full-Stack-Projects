<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Glossary</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Digital Glossary</h1>
            <p>Interactive reference for common HTML formatting tags.</p>
        </header>

        <section class="controls">
            <input type="text" id="searchInput" placeholder="Search tags (e.g. <b>, <i>)..." autocomplete="off">
        </section>

        <div class="table-view">
            <table>
                <thead>
                    <tr>
                        <th>Tag</th>
                        <th>Category</th>
                        <th>Functionality</th>
                        <th>Example</th>
                    </tr>
                </thead>
                <tbody id="glossaryBody">
                    <!-- Javascript will populate this -->
                </tbody>
            </table>
            <div id="noResults" class="no-results hidden">
                No matching tags found.
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
