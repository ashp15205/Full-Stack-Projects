<!DOCTYPE html>
<html>
<head>
    <title>Digital Glossary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>HTML Formatting Tags</h2>

    <input id="search" placeholder="Search tags..." onkeyup="filter()">

    <table id="table">
        <tr>
            <th>Tag</th>
            <th>Description</th>
            <th>Example</th>
        </tr>

        <tr>
            <td>&lt;b&gt;</td>
            <td>Bold text</td>
            <td><b>Bold</b></td>
        </tr>

        <tr>
            <td>&lt;i&gt;</td>
            <td>Italic text</td>
            <td><i>Italic</i></td>
        </tr>

        <tr>
            <td>&lt;u&gt;</td>
            <td>Underline text</td>
            <td><u>Underline</u></td>
        </tr>

        <tr>
            <td>&lt;strong&gt;</td>
            <td>Important text</td>
            <td><strong>Strong</strong></td>
        </tr>

        <tr>
            <td>&lt;em&gt;</td>
            <td>Emphasized text</td>
            <td><em>Emphasis</em></td>
        </tr>

        <tr>
            <td>&lt;mark&gt;</td>
            <td>Highlighted text</td>
            <td><mark>Highlight</mark></td>
        </tr>

    </table>
</div>

<script src="script.js"></script>
</body>
</html>
