<!doctype html>
<html>
  <head>
    <title>PS28 - API Middleware</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>PS28 — Secure API Middleware Tester</h2>
    <div class="card">
      <h3>Test API Key Auth</h3>
      <input
        id="key"
        placeholder="Enter API Key (try: MY_SECRET_KEY_2026)"
        style="width: 90%"
      />
      <button onclick="fetchData()">
        Fetch Secure Data
      </button>
      <div
        id="res"
        style="margin-top: 15px; text-align: left"
      ></div>
    </div>
    <div class="card" style="margin-top: 15px">
      <h3>How it works</h3>
      <pre
        style="
          color: #aab4fc;
          font-size: 0.85rem;
          text-align: left;
          overflow: auto;
        "
      >
GET /secure-data
Headers: { "x-api-key": "MY_SECRET_KEY_2026" }

→ 200 OK: Returns sensitive data
→ 401: No API key provided
→ 403: Wrong API key
    </pre
      >
    </div>
    <script>
      async function fetchData() {
        const key = document.getElementById("key").value;
        try {
          const r = await fetch(
            "http://localhost:3004/secure-data",
            { headers: { "x-api-key": key } },
          );
          const d = await r.json();
          document.getElementById("res").innerHTML = r.ok
            ? `<div style="color:#4caf50">✅ Status ${r.status}<pre>${JSON.stringify(d, null, 2)}</pre></div>`
            : `<div style="color:#f72585">❌ Status ${r.status}: ${d.error}</div>`;
        } catch (e) {
          document.getElementById("res").innerHTML =
            '<span style="color:#f72585">Server not running on port 3004</span>';
        }
      }
    </script>
  </body>
</html>
