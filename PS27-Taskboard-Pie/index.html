<!DOCTYPE html>
<html><head><title>PS27 - Kanban + Pie Chart</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><link rel="stylesheet" href="style.css"></head>
<body>
  <h2>Task Burndown Board</h2>
  <div class="layout">
    <div>
      <div class="boards">
        <div class="col" id="todo"><h3>📋 To-Do</h3></div>
        <div class="col" id="doing"><h3>🔄 Doing</h3></div>
        <div class="col" id="done"><h3>✅ Done</h3></div>
      </div>
      <div style="margin-top:10px;">
        <input id="taskIn" placeholder="New task...">
        <button onclick="addTask()">Add</button>
      </div>
    </div>
    <div class="card"><canvas id="chart" style="max-width:250px;"></canvas></div>
  </div>
  <script src="script.js"></script>
</body></html>
