<!DOCTYPE html>
<html>
<head><title>E-Commerce</title><link rel="stylesheet" href="style.css"></head>
<body>
  <div style="display: flex; justify-content: space-between;">
    <h2>Store <button onclick="toggleAdmin()">Admin Login/Logout</button></h2>
  </div>

  <div id="adminPanel" hidden class="panel">
    <h3>Admin</h3>
    <input id="aId" type="hidden">
    <input id="aEmo" placeholder="Emoji"><input id="aName" placeholder="Name"><input id="aPrice" type="number" placeholder="Price">
    <button onclick="saveProd()">Save</button>
  </div>

  <div style="display: flex; gap: 20px;">
    <div style="width: 60%"><div id="products"></div></div>
    <div style="width: 40%" class="panel">
      <h3>Cart</h3>
      <div id="cart"></div>
      <p>Subtotal: <span id="sub">0</span></p>
      <input id="coup" placeholder="Coupon"><button onclick="applyCoup()">Apply</button>
      <div id="cMsg"></div>
      <h4>Total: <span id="tot">0</span></h4>
      <button onclick="checkout()">Checkout</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
