<!doctype html>
<html>
  <head>
    <title>PS10 - Bitcoin Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>Bitcoin Live Price ₿</h2>
    <div class="card">
      <div style="font-size: 4rem; margin-bottom: 15px">
        ₿
      </div>
      <div id="price" class="price-val pulse">
        Fetching...
      </div>
      <div id="time" class="last-upd">Last updated: —</div>
      <div
        style="
          margin-top: 20px;
          color: #aab4fc;
          font-size: 0.85rem;
        "
      >
        Auto-refreshes every 30 seconds
      </div>
    </div>
    <div
      style="
        background: rgba(255, 255, 255, 0.05);
        padding: 15px;
        border-radius: 8px;
        margin: 20px auto;
        max-width: 400px;
        text-align: left;
      "
    >
      <h3 style="margin-top: 0; text-align: center">
        Price Alerts (CRUD)
      </h3>
      <div style="display: flex; gap: 10px">
        <input
          type="text"
          id="inp"
          placeholder="Alert threshold (e.g. $65000)..."
          style="
            flex: 1;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #fff;
            color: #fff;
            border-radius: 4px;
          "
        />
        <button
          onclick="addAlert()"
          style="
            padding: 8px 15px;
            background: #6c63ff;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
          "
        >
          Set Alert
        </button>
      </div>
      <ul
        id="list"
        style="
          padding-left: 0;
          list-style: none;
          margin-top: 15px;
        "
      ></ul>
    </div>
    <script>
      async function fetchPrice() {
        try {
          const res = await fetch(
            "https://api.coindesk.com/v1/bpi/currentprice.json",
          );
          const data = await res.json();
          document.getElementById("price").innerText =
            "$" + data.bpi.USD.rate;
          document.getElementById("time").innerText =
            "Last updated: " +
            new Date().toLocaleTimeString();
        } catch (e) {
          document.getElementById("price").innerText =
            "API unavailable";
          document.getElementById("time").innerText =
            "Check network connection";
        }
      }
      fetchPrice();
      setInterval(fetchPrice, 30000);

      // CRUD logic for Alerts
      function getAlerts() {
        return JSON.parse(
          localStorage.getItem("btc_alerts") || "[]",
        );
      }
      function addAlert() {
        let val = document
          .getElementById("inp")
          .value.trim();
        if (!val) return;
        let data = getAlerts();
        data.push(val);
        localStorage.setItem(
          "btc_alerts",
          JSON.stringify(data),
        );
        document.getElementById("inp").value = "";
        renAlerts();
      }
      function editAlert(i) {
        let data = getAlerts();
        let newVal = prompt("Edit Alert:", data[i]);
        if (newVal && newVal.trim()) {
          data[i] = newVal.trim();
          localStorage.setItem(
            "btc_alerts",
            JSON.stringify(data),
          );
          renAlerts();
        }
      }
      function delAlert(i) {
        let data = getAlerts();
        data.splice(i, 1);
        localStorage.setItem(
          "btc_alerts",
          JSON.stringify(data),
        );
        renAlerts();
      }
      function renAlerts() {
        document.getElementById("list").innerHTML =
          getAlerts()
            .map(
              (item, index) => `
        <li style="display:flex; justify-content:space-between; margin-bottom:10px; padding:10px; background:rgba(255,255,255,0.1); border-radius:4px;">
          <span>${item}</span>
          <div>
            <button onclick="editAlert(${index})" style="background:#fbbf24; border:none; border-radius:3px; padding:3px 8px; cursor:pointer; font-weight:bold; color:#000;">Edit</button>
            <button onclick="delAlert(${index})" style="background:#f72585; border:none; border-radius:3px; padding:3px 8px; cursor:pointer; font-weight:bold; color:#fff;">Del</button>
          </div>
        </li>
      `,
            )
            .join("");
      }
      renAlerts();
    </script>
  </body>
</html>
