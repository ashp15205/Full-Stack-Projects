<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Form Validation</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <h1>📝 Registration Form</h1>
    <p>All fields are validated in real-time</p>
  </header>
  <main class="container">
    <form id="regForm" class="form-card" novalidate>
      <div class="field-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="John Doe"/>
        <span class="error-msg" id="nameErr"></span>
      </div>
      <div class="field-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="john@example.com"/>
        <span class="error-msg" id="emailErr"></span>
      </div>
      <div class="field-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="10-digit number"/>
        <span class="error-msg" id="phoneErr"></span>
      </div>
      <div class="field-group">
        <label for="password">Password</label>
        <div class="pwd-wrapper">
          <input type="password" id="password" placeholder="Min 8 chars"/>
          <button type="button" id="togglePwd" class="toggle-pwd">👁</button>
        </div>
        <div class="strength-bar"><div id="strengthFill" class="strength-fill"></div></div>
        <span class="strength-label" id="strengthLabel"></span>
        <span class="error-msg" id="passwordErr"></span>
      </div>
      <div class="field-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Re-enter password"/>
        <span class="error-msg" id="confirmErr"></span>
      </div>
      <div class="field-group">
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob"/>
        <span class="error-msg" id="dobErr"></span>
      </div>
      <div class="check-group">
        <input type="checkbox" id="terms"/>
        <label for="terms">I agree to the <a href="#">Terms and Conditions</a></label>
        <span class="error-msg" id="termsErr"></span>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">Create Account</button>
      <div id="successMsg" class="success-msg hidden">🎉 Account created successfully!</div>
    </form>
  </main>
  <script src="script.js"></script>
</body>
</html>
