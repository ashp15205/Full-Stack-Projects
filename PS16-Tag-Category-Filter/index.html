<!doctype html>
<html>
  <head>
    <title>PS16 - Tag Explorer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>HTML Tag Explorer</h2>
    <div class="card">
      <button onclick="setCat('all')">All</button>
      <button onclick="setCat('inline')">Inline</button>
      <button onclick="setCat('block')">Block</button>
      <table id="tbl">
        <thead>
          <tr>
            <th>Tag</th>
            <th>Type</th>
            <th>Description</th>
          </tr>
        </thead>
        <tbody id="body"></tbody>
      </table>
    </div>
    <script src="script.js"></script>
  </body>
</html>
