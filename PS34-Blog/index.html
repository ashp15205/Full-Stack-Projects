<!doctype html>
<html>
  <head>
    <title>PS34 - Blog Layout</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header><h1>My Blog</h1></header>
    <div class="layout">
      <main>
        <article>
          <h2>Post Title</h2>
          <p>
            This is the main blog post content. It uses
            Flexbox and Grid to create a clean, responsive
            layout with header, sidebar, content area, and
            footer.
          </p>
        </article>
      </main>
      <aside>
        <div
          style="
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
          "
        >
          <h3>Manage Posts (CRUD)</h3>
          <input
            type="text"
            id="inp"
            placeholder="New post title..."
            style="
              width: 100%;
              padding: 8px;
              margin-bottom: 10px;
              background: rgba(255, 255, 255, 0.1);
              border: 1px solid #fff;
              color: #fff;
              border-radius: 4px;
            "
          />
          <button
            onclick="add()"
            style="
              width: 100%;
              padding: 8px;
              background: #6c63ff;
              border: none;
              color: white;
              border-radius: 4px;
              cursor: pointer;
            "
          >
            Add Post
          </button>
          <ul
            id="list"
            style="
              margin-top: 15px;
              padding-left: 0;
              list-style: none;
            "
          ></ul>
        </div>
        <h3>Categories</h3>
        <ul>
          <li>Technology</li>
          <li>Design</li>
          <li>JavaScript</li>
        </ul>
      </aside>
    </div>
    <footer><p>© 2026 My Blog</p></footer>
    <script src="script.js"></script>
  </body>
</html>
